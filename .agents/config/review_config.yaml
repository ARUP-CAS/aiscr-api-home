# review_config.yaml — AI review configuration for aiscr-api-home
#
# Static API documentation site (Quarto / JS / Lua / Python).
# No application backend in this repository.

repository:
  name: aiscr-api-home
  url: https://github.com/ARUP-CAS/aiscr-api-home
  type: api-documentation
  organisation: ARUP-CAS
  primary_language: en  # English (API docs); some UI strings in Czech
  licence: CC-BY-NC-4.0
  published_url: https://api.aiscr.cz/
  default_branch: main
  development_branch: main  # single-branch workflow — PRs always target main

stack:
  documentation_framework: quarto
  quarto_version: ">=1.4"
  scripting:
    - javascript   # 50.3% — build scripts / interactive elements
    - python       # 7.2%  — auxiliary build scripts only (not an app backend)
  lua_filters: true  # 14.2%
  styling:
    - scss
    - css
  extensions:
    - quarto-ext/fontawesome

  # Explicitly disabled (not applicable to this repo):
  backend: false
  database: false
  docker: false
  orm: false
  celery: false

ci_cd:
  provider: github-actions
  workflows_path: .github/
  deployment_target: github-pages
  custom_domain: api.aiscr.cz

# ─── Live endpoints ───────────────────────────────────────────────────────────
# These are the real, testable endpoints agents must verify against.
# Run curl checks from here before editing any documentation section.

live_endpoints:
  oai_pmh:
    generic: https://api.aiscr.cz/oai
    current_version: "2.2"
    current_endpoint: https://api.aiscr.cz/2.2/oai
    previous_endpoint: https://api.aiscr.cz/2.1/oai
    schema_current: https://api.aiscr.cz/schema/amcr/2.2/
    schema_previous: https://api.aiscr.cz/schema/amcr/2.1/

    # Verbs and their verification URLs (all publicly accessible)
    verbs:
      Identify:
        url: https://api.aiscr.cz/2.2/oai?verb=Identify
        curl: "curl -s 'https://api.aiscr.cz/2.2/oai?verb=Identify'"
        expected_http: 200
        check: "<protocolVersion>2.0</protocolVersion> present in response"
      ListMetadataFormats:
        url: https://api.aiscr.cz/2.2/oai?verb=ListMetadataFormats
        curl: "curl -s 'https://api.aiscr.cz/2.2/oai?verb=ListMetadataFormats'"
        expected_prefixes: [oai_dc, oai_amcr]
      ListSets:
        url: https://api.aiscr.cz/2.2/oai?verb=ListSets
        curl: "curl -s 'https://api.aiscr.cz/2.2/oai?verb=ListSets'"
        expected_sets:
          - projekt
          - archeologicky_zaznam
          - archeologicky_zaznam:akce
          - archeologicky_zaznam:lokalita
          - let
          - adb
          - dokument
          - dokument:3d
          - ext_zdroj
          - pian
          - samostatny_nalez
          - uzivatel
          - heslo
          - organizace
          - osoba
          - ruian_kraj
          - ruian_okres
          - ruian_katastr
      ListIdentifiers:
        example_url: "https://api.aiscr.cz/2.2/oai?verb=ListIdentifiers&metadataPrefix=oai_amcr&set=projekt"
        curl: "curl -s 'https://api.aiscr.cz/2.2/oai?verb=ListIdentifiers&metadataPrefix=oai_amcr&set=projekt'"
        expected_http: 200
      ListRecords:
        example_url: "https://api.aiscr.cz/2.2/oai?verb=ListRecords&metadataPrefix=oai_dc&set=projekt"
        curl: "curl -s 'https://api.aiscr.cz/2.2/oai?verb=ListRecords&metadataPrefix=oai_dc&set=projekt'"
        expected_http: 200
        check: "<resumptionToken completeListSize=...> present"
      GetRecord:
        example_url: "https://api.aiscr.cz/2.2/oai?verb=GetRecord&identifier=https://api.aiscr.cz/id/M-FT-110598700&metadataPrefix=oai_amcr"
        curl: "curl -s 'https://api.aiscr.cz/2.2/oai?verb=GetRecord&identifier=https://api.aiscr.cz/id/M-FT-110598700&metadataPrefix=oai_amcr'"
        known_stable_identifier: "https://api.aiscr.cz/id/M-FT-110598700"

    authentication:
      type: HTTP Basic Authentication
      required_for: records with limited accessibility (roles B, C, D)
      registration_url: https://amcr.aiscr.cz/accounts/register/
      anonymous_role: A

    identifier_pattern: "https://api.aiscr.cz/id/[ident_cely]"
    example_identifier: "https://api.aiscr.cz/id/C-202013149"

  file_api:
    docs_url: https://api.aiscr.cz/file-api/
    section_path: file-api/
    backend_repo: https://github.com/ARUP-CAS/aiscr-digiarchiv-2
    backend_stack: Java / Spring + Solr
    live_base_url: https://digiarchiv.aiscr.cz/id/
    note: >
      File API is served by the aiscr-digiarchiv-2 application at digiarchiv.aiscr.cz —
      NOT at api.aiscr.cz (which is only the documentation site).
      File URLs come from the <amcr:url> element inside <amcr:soubor> in OAI-PMH responses.
      Verify specific endpoint paths against aiscr-digiarchiv-2 Spring controller routes
      (web/src/main/java/) or by inspecting network requests in Browser DevTools at
      https://digiarchiv.aiscr.cz/.
    curl_base_check: "curl -s -o /dev/null -w '%{http_code}' 'https://digiarchiv.aiscr.cz/'"
    authentication:
      type: HTTP Basic Authentication
      note: >
        HTTP Basic Auth (username + password) only.
        Bearer token from Auth API is NOT (yet) supported for File API.
      registration_url: https://amcr.aiscr.cz/accounts/register/
    known_endpoints:
      small_thumbnail:
        method: GET
        pattern: "/id/{ident_cely}/file/{file_id}/thumb"
        example_url: "https://digiarchiv.aiscr.cz/id/M-202301215-N00001/file/aa0cdd95-4bc4-4358-a831-2cf8672a3e4b/thumb"
        curl: "curl -s -o /dev/null -w '%{http_code}' 'https://digiarchiv.aiscr.cz/id/M-202301215-N00001/file/aa0cdd95-4bc4-4358-a831-2cf8672a3e4b/thumb'"
        description: "PNG, max 100x100 px; first page for multipage documents"
        expected_http_public: 200
        auth_required: false  # for role-A accessible files
      large_thumbnail:
        method: GET
        pattern: "/id/{ident_cely}/file/{file_id}/thumb/page/{page}"
        example_url: "https://digiarchiv.aiscr.cz/id/C-TX-198603094/file/3e28c562-17f6-48dc-b8f5-787d14fb55af/thumb/page/2"
        curl: "curl -s -o /dev/null -w '%{http_code}' 'https://digiarchiv.aiscr.cz/id/C-TX-198603094/file/3e28c562-17f6-48dc-b8f5-787d14fb55af/thumb/page/2'"
        description: "JPEG (documents) or PNG (images), max 800x800 px; page-specific"
        auth_required: true  # for restricted files
      original_file:
        method: GET
        pattern: "/id/{ident_cely}/file/{file_id}"
        example_url: "https://digiarchiv.aiscr.cz/id/M-202301215-N00001/file/aa0cdd95-4bc4-4358-a831-2cf8672a3e4b"
        curl: "curl -s -o /dev/null -w '%{http_code}' 'https://digiarchiv.aiscr.cz/id/M-202301215-N00001/file/aa0cdd95-4bc4-4358-a831-2cf8672a3e4b'"
        expected_http_public: 200
        auth_required: false  # for role-A accessible files
    error_codes:
      401: "Unauthorized — invalid credentials"
      403: "Forbidden — insufficient permissions"
      404: "Not Found — invalid ident_cely or file_id"
      429: "Too Many Requests — parallelisation not supported; use >=1s between requests"
    variables:
      ident_cely: "Full record identifier, e.g. M-202301215-N00001 or C-TX-198603094"
      file_id: "UUID of the file, e.g. aa0cdd95-4bc4-4358-a831-2cf8672a3e4b"
      page: "Integer — page number for large thumbnail endpoint"

  auth_api:
    docs_url: https://api.aiscr.cz/auth-api/
    section_path: auth-api/
    backend_repo: https://github.com/ARUP-CAS/aiscr-webamcr
    backend_stack: Django REST Framework / Python
    live_base_url: https://amcr.aiscr.cz/
    note: >
      Auth API is served by the aiscr-webamcr application at amcr.aiscr.cz —
      NOT at api.aiscr.cz (which is only the documentation site).
      The bearer token obtained here is used ONLY for uzivatel-info endpoint.
      OAI-PMH API and File API use HTTP Basic Authentication directly — NOT the bearer token.
      Verify specific endpoint paths against aiscr-webamcr Django views and serialisers:
      webclient/urls.py, webclient/*/urls.py, webclient/*/views.py,
      webclient/*/serializers.py.
    curl_base_check: "curl -s -o /dev/null -w '%{http_code}' 'https://amcr.aiscr.cz/'"
    known_endpoints:
      token_auth:
        method: POST
        url: "https://amcr.aiscr.cz/api/token-auth/"
        curl: "curl -X POST https://amcr.aiscr.cz/api/token-auth/ -H 'Content-Type: application/json' -d '{\"username\":\"<user>\",\"password\":\"<pass>\"}'"
        auth: none  # credentials in request body
        request_body: '{"username": "string", "password": "string"}'
        response_format: JSON
        response_example: '{"token": "<token>"}'
        token_validity: 24 hours
        expected_http: 200
      uzivatel_info:
        method: GET
        url: "https://amcr.aiscr.cz/api/uzivatel-info/"
        curl: "curl -H 'Authorization: Bearer <token>' 'https://amcr.aiscr.cz/api/uzivatel-info/'"
        auth: Bearer token (obtained from token_auth endpoint)
        response_format: XML  # follows AMCR OAI-PMH schema
        expected_http_authenticated: 200
        expected_http_unauthenticated: 401
    registration_url: https://amcr.aiscr.cz/accounts/register/

# ─── Source code repositories ─────────────────────────────────────────────────
source_repos:
  auth_api_backend:
    url: https://github.com/ARUP-CAS/aiscr-webamcr
    live_url: https://amcr.aiscr.cz/
    stack: Django REST Framework / Python
    verify: endpoint paths, request/response schemas, HTTP status codes, auth flow
    key_files:
      - webclient/urls.py
      - webclient/*/urls.py
      - webclient/*/views.py
      - webclient/*/serializers.py
  file_api_backend:
    url: https://github.com/ARUP-CAS/aiscr-digiarchiv-2
    live_url: https://digiarchiv.aiscr.cz/
    stack: Java / Spring + Solr
    verify: controller routes, file serving paths, Solr schema field names
    key_files:
      - web/src/main/java/
    note: >
      File API endpoints are accessible from OAI-PMH response links (<amcr:soubor>).
      Use Browser DevTools on https://digiarchiv.aiscr.cz/ to inspect actual
      file and thumbnail request URLs before editing file-api/ documentation.
  oai_pmh_backend:
    url: https://github.com/ARUP-CAS/aiscr-digiarchiv-2
    live_url: https://api.aiscr.cz/oai
    stack: Java / Spring + Solr
    verify: set definitions, field mappings, access control rules

technical_docs:
  amcr_readthedocs: https://aiscr-webamcr.readthedocs.io/

# ─── Active domain analyses ───────────────────────────────────────────────────
domain_analyses:
  cicd_analysis:
    enabled: true
    path: .agents/analysis/cicd_analysis.json

  frontend_analysis:
    enabled: true
    path: .agents/analysis/frontend_analysis.json
    description: SCSS/CSS theme, Lua filters, JS build scripts, Quarto config

  # Disabled — not applicable to this repo:
  docker_analysis:
    enabled: false
  orm_analysis:
    enabled: false
  security_analysis:
    enabled: false
    note: "Static documentation site — no backend to audit"
  solr_analysis:
    enabled: false
  xslt_analysis:
    enabled: false

# ─── Review configuration ─────────────────────────────────────────────────────
review:
  focus_areas:
    - api_accuracy            # Documented endpoints vs. live API and source code
    - endpoint_verification   # curl-based checks against live endpoints
    - schema_conformance      # OAI-PMH XSD schema consistency
    - oai_pmh_standard        # Conformance with OAI-PMH v2.0 standard
    - quarto_configuration
    - content_completeness
    - internal_links
    - external_links
    - changelog_accuracy
    - navigation_structure
    - styling_consistency
    - lua_filters
    - cicd_health

  exclusions:
    - _freeze/
    - _site/
    - fonts/
    - figs/

  report_path: .agents/reports/review_reports/
  cache_path: .agents/config/review_cache.json
  bugs_path: .agents/reports/bugs.md
  backlog_path: .agents/reports/refactoring_backlog.md

# Session registry — single source of truth for session definitions.
# review_codebase.md references this section; do not duplicate the list there.
sessions:
  - id: S01
    name: general_review
    description: Full repository — structure, navigation, content, links
    target: .agents/reports/review_reports/YYYY-MM-DD-general-review.md
    trigger: after each release

  - id: S02
    name: oai_pmh_accuracy
    description: OAI-PMH documentation vs live API and aiscr-digiarchiv-2 source
    target: .agents/reports/review_reports/YYYY-MM-DD-oai-pmh-accuracy.md
    trigger: after API changes or schema updates

  - id: S03
    name: file_api_accuracy
    description: File API documentation vs live digiarchiv.aiscr.cz and source
    target: .agents/reports/review_reports/YYYY-MM-DD-file-api-accuracy.md
    trigger: after File API changes

  - id: S04
    name: auth_api_accuracy
    description: Auth API documentation vs live amcr.aiscr.cz and aiscr-webamcr source
    target: .agents/reports/review_reports/YYYY-MM-DD-auth-api-accuracy.md
    trigger: after Auth API changes

  - id: S05
    name: linkcheck
    description: Broken internal and external links
    target: .agents/reports/review_reports/YYYY-MM-DD-linkcheck.md
    trigger: monthly

  - id: S06
    name: changelog_review
    description: CHANGELOG accuracy and version coverage
    target: .agents/reports/review_reports/YYYY-MM-DD-changelog.md
    trigger: before releases

  - id: S07
    name: cicd_review
    description: GitHub Actions workflows — build and deploy health
    target: .agents/reports/review_reports/YYYY-MM-DD-cicd.md
    trigger: when workflows change
